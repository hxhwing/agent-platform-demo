name: Publish codelab to GitHub Pages

# Rebuilds the codelab from guide.md and deploys it to GitHub Pages.
# Runs on every push that touches the guide or the codelab tooling, and can
# be triggered manually from the Actions tab.
on:
  push:
    branches: [main]
    paths:
      - "guide.md"
      - "codelab/**"
      - ".github/workflows/codelab-pages.yml"
  workflow_dispatch:

# Permissions required for the deploy-pages action.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build codelab (guide.md -> static HTML)
        # Uses the committed claat binary and cached img/*.svg, so no
        # claat download or Mermaid/Chromium render is needed in CI.
        run: ./codelab/build.sh

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: codelab/game-character-designer

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
